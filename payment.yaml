- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop: 
    - python3
    - gcc
    - python3-devel

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"

  - name: delete app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete payment zip file
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent

  - name: download payment
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: unarchive payment
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: install dependecies
    ansible.builtin.pip:
      requirments: requirments.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy payment server
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: start enable and reload
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes