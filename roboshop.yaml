- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars: 
    sg_id: sg-0075554bad5e3c743
    ami_id: ami-0220d79f3f480ecf5
    domain_name: devsecosaws26.online
    env: dev
    action: create
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags: 
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env}}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"

  - name: print the ec2_output  
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
      when: action == "create"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" #mongodb-dev.devsecosaws26.online, frontend
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address}}" 
      wait: true
    loop: "{{ ec2_output.results }}" #list
    when: action == "create"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" #roboshop-dev.devsecosaws26.online, frontend
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address}}" 
      wait: true
    loop: "{{ ec2_output.results }}" #list
    when: 
    - item.item == "frontend"
    - action == "create"

  - name: delete ec2 instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}- {{ env }}"
    loop: "{{ instances }}"
  

 